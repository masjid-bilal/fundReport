<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhonePe Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.payment-card{
background:#1b1b1b;
padding:25px;
border-radius:12px;
text-align:center;
color:white;
max-width:380px;
width:100%;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

.logo{
font-size:22px;
font-weight:600;
color:#a970ff;
margin-bottom:10px;
}

.note{
color:#ccc;
font-size:14px;
margin-bottom:20px;
}

.qr{
width:100%;
max-width:260px;
border-radius:10px;
}

.name{
margin-top:15px;
font-size:18px;
font-weight:500;
}

.footer{
margin-top:15px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="payment-card">

<div class="logo">PhonePe Accepted Here</div>

<p class="note">Scan & Pay using PhonePe</p>

<img src="phonepe-qr.jpg" class="qr" alt="PhonePe QR">

<div class="name">Mohd Asheer</div>

<div class="footer">Secure UPI Payment</div>

</div>

</body>
</html>
