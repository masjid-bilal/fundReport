<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pay via PhonePe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.payment-box{
    background:#1b1b1b;
    padding:30px;
    border-radius:10px;
    text-align:center;
    color:white;
    width:320px;
}

.payment-box h2{
    color:#a970ff;
}

.qr{
    width:250px;
    margin:20px 0;
    border-radius:10px;
}

.name{
    font-size:18px;
    margin-top:10px;
}

.note{
    font-size:14px;
    color:#ccc;
}

</style>
</head>

<body>

<div class="payment-box">

<h2>Pay Using PhonePe</h2>

<p class="note">Scan the QR code to send payment</p>

<img src="phonepe-qr.jpg" class="qr">

<div class="name">Mohd Asheer</div>

</div>

</body>
</html>
