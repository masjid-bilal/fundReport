<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cash Receipt</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    width:700px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border:1px solid #ddd;
    position:relative;
}

.stamp{
    position:absolute;
    top:20px;
    left:20px;
    width:90px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.receipt-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th, table td{
    border:1px solid #ccc;
    padding:10px;
}

.total{
    text-align:right;
    font-weight:bold;
    margin-top:15px;
}

.signature{
    margin-top:60px;
    display:flex;
    justify-content:space-between;
}
.auth-sign{
    position:relative;
    width:150px;
}

.auth-sign span{
    display:block;
    margin-top:40px;
}

.sign{
    position:absolute;
    top:-10px;
    left:10px;
    width:120px;
}
</style>
</head>

<body>

<div class="container">

<img src="stamp.jpg" class="stamp">

<div class="header">
<h2>Cash Receipt</h2>
<p>Masjid Bilal Fund - Richha</p>
</div>

<div class="receipt-info">
<div>
<strong>Receipt No:</strong> 001 <br>
<strong>Date:</strong> 13 March 2026
</div>

<div>
<strong>Received From:</strong><br>
Customer Name
</div>
</div>

<table>

<tr>
<th>Description</th>
<th>Amount</th>
</tr>

<tr>
<td>Service Payment</td>
<td>₹5000</td>
</tr>

<tr>
<td><strong>Payment Mode</strong></td>
<td>Cash</td>
</tr>

</table>

<div class="total">
Total: ₹5000
</div>

<div class="signature">
<div>
Customer Signature
</div>

<div>
<div class="auth-sign">
<img src="images/sign.png" class="sign">
<span>Authorized Signature</span>
</div>
</div>
</div>

</div>

</body>
</html>
