<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cash Receipt</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    width:700px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border:1px solid #ddd;
    position:relative;
}

.stamp{
    position:absolute;
    top:20px;
    left:20px;
    width:90px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.receipt-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th, table td{
    border:1px solid #ccc;
    padding:10px;
}

.total{
    text-align:right;
    font-weight:bold;
    margin-top:15px;
}

.signature{
    margin-top:60px;
    display:flex;
    justify-content:space-between;
}

.auth-sign{
    position:relative;
    width:150px;
}

.auth-sign span{
    display:block;
    margin-top:40px;
}

.sign{
    position:absolute;
    top:-35px;
    left:10px;
    width:180px;
    filter:sepia(1) saturate(5) hue-rotate(180deg);
}

</style>
</head>

<body>

<div class="container">

<img src="stamp.jpg" class="stamp">

<div class="header">
<h2>Cash Receipt</h2>
<p>Masjid Bilal Fund - Richha</p>
</div>

<div class="receipt-info">
<div>
<h3>Receipt No: <span id="r_num"></span></h3>
<strong>Date:</strong> <span id="r_date"></span>
</div>

<div>
<strong>Received From:</strong><br>
<h3>Customer Name: <span id="r_name"></span></h3>
</div>
</div>

<table>

<tr>
<th>Description</th>
<th>Amount</th>
</tr>

<tr>
<td id="r_desc"></td>
<td id="r_amount"></td>
</tr>

<tr>
<td><strong>Payment Mode</strong></td>
<td id="r_mode"></td>
</tr>

</table>

<div class="total">
<h3>Total: ₹<span id="r_total"></span></h3>
</div>

<div class="signature">

<div>
Customer Signature
</div>

<div class="auth-sign">
<img src="sign.jpg" class="sign">
<span>Authorized Signature</span>
</div>

</div>

</div>

</body>
</html>
