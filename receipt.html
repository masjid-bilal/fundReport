<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donation Receipt</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

.receipt{
    width:750px;
    margin:40px auto;
    background:white;
    padding:30px;
    border:2px solid #333;
    position:relative;   /* important */
}

.header{
    text-align:center;
    border-bottom:2px solid #333;
    padding-bottom:10px;
    margin-bottom:20px;
}

.header h2{
    margin:0;
}

.info{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

table th, table td{
    border:1px solid #333;
    padding:10px;
}

.amount-box{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.words{
    margin-top:10px;
    font-style:italic;
}

.footer{
    margin-top:50px;
    display:flex;
    justify-content:space-between;
}

.sign{
    width:180px;
    text-align:center;
}

.sign img{
    width:150px;
    filter:sepia(1) saturate(5) hue-rotate(200deg);
    margin-top:-30px;   /* value badhaoge to sign aur niche jayega */
}
.stamp{
    position:absolute;
    top:18px;
    left:20px;
    width:100px;
    opacity:0.8;
}

</style>

</head>
<script>

document.addEventListener("DOMContentLoaded", function(){

const params = new URLSearchParams(window.location.search);

let amount = params.get("amount");

document.getElementById("r_num").innerText = params.get("sr");
document.getElementById("r_name").innerText = params.get("name");
document.getElementById("r_desc").innerText = params.get("desc");
document.getElementById("r_mode").innerText = params.get("mode");

document.getElementById("r_amount").innerText = "₹"+amount;
document.getElementById("r_total").innerText = amount;

let today = new Date().toLocaleDateString();
document.getElementById("r_date").innerText = today;

/* amount to words */

let words = numberToWords(parseInt(amount));

document.getElementById("amount_words").innerText =
words + " Rupees Only";

});

</script>
<body>

<div class="receipt">

<div class="header">
<h2>MASJID BILAL FUND</h2>
<p>Donation Receipt</p>
</div>

<div class="info">

<div>
<strong>Receipt No:</strong><span id="r_num"></span><br>
<strong>Date:</strong><span id="r_date"></span><br>
</div>

<div>
<strong>Received From:</strong><br>
<span id="r_name"></span><br>
</div>

</div>

<table>

<tr>
<th>Description</th>
<th>Payment Mode</th>
<th>Amount (INR)</th>
</tr>

<tr>
<td id="r_desc"></td>
<td id="r_mode">Cash</td>
<td id="r_amount">₹</td>
</tr>

</table>

<div class="amount-box">
Total Amount: ₹<span id="r_total"></span>
</div>

<div class="words">
Amount in Words:<p style="font: bold;"><span id="amount_words"></span></p>
</div>

<div class="footer">

<div>
<img src="stamp.jpg" class="stamp">
</div>

<div class="sign">
<img src="sign.jpg"><br>
Authorized Signature
</div>

</div>

</div>

</body>
<script src="amountWords.js"></script>
</html>
