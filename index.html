<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table to PDF</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
}

/* header section */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

/* button style */
.download-btn{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 14px;
    border:none;
    background:#e74c3c;
    color:white;
    font-size:14px;
    cursor:pointer;
    border-radius:6px;
}

.download-btn:hover{
    background:#c0392b;
}

.download-btn i{
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

thead{
    background:#2c3e50;
    color:white;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>Payment Table</h2>

<button class="download-btn" onclick="downloadPDF()">
<i class="fa-solid fa-file-pdf"></i> PDF
</button>

</div>

<div id="tableArea">

<table>

<thead>
<tr>
<th>Sr No.</th>
<th>Name</th>
<th>Amount</th>
</tr>
</thead>

<tbody>
<tr>
<td>1</td>
<td>Rahul</td>
<td>5000</td>
</tr>

<tr>
<td>2</td>
<td>Ali</td>
<td>7500</td>
</tr>

<tr>
<td>3</td>
<td>Aman</td>
<td>3200</td>
</tr>
</tbody>

</table>

</div>

</div>

<!-- icon library -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- pdf library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="pdf.js"></script>

</body>
</html>
