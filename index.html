<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table to PDF</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

thead{
    background:#2c3e50;
    color:white;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#27ae60;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#1e8449;
}

</style>
</head>

<body>

<div class="container" id="tableArea">

<h2>Payment Table</h2>

<table>
<thead>
<tr>
<th>Sr No.</th>
<th>Name</th>
<th>Amount</th>
</tr>
</thead>

<tbody>
<tr>
<td>1</td>
<td>Rahul</td>
<td>5000</td>
</tr>

<tr>
<td>2</td>
<td>Ali</td>
<td>7500</td>
</tr>

<tr>
<td>3</td>
<td>Aman</td>
<td>3200</td>
</tr>
</tbody>

</table>

</div>

<button onclick="downloadPDF()">Download PDF</button>

<!-- Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

function downloadPDF(){

const element = document.getElementById("tableArea");

html2pdf().from(element).save("table-data.pdf");

}

</script>

</body>
</html>
