<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Table</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:40px;
}

.table-container{
    max-width:700px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

thead{
    background:#2c3e50;
    color:white;
}

th, td{
    padding:12px 15px;
    text-align:left;
}

th{
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-size:14px;
}

tbody tr{
    border-bottom:1px solid #ddd;
}

tbody tr:nth-child(even){
    background:#f9f9f9;
}

tbody tr:hover{
    background:#f1f1f1;
}

.amount{
    font-weight:bold;
    color:#27ae60;
}

</style>
</head>

<body>

<div class="table-container">

<table>

<thead>
<tr>
<th>Sr No.</th>
<th>Name</th>
<th>Amount</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Rahul</td>
<td class="amount">₹5,000</td>
</tr>

<tr>
<td>2</td>
<td>Ali</td>
<td class="amount">₹7,500</td>
</tr>

<tr>
<td>3</td>
<td>Aman</td>
<td class="amount">₹3,200</td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
